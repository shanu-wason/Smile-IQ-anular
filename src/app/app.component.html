<div *ngIf="showSplash" class="splash-shell">
  <div class="splash-card">
    <img src="smile-iq-logo.png" alt="Smile IQ logo" class="splash-logo" />
    <h1 class="splash-title">Smile IQ</h1>
    <p class="splash-subtitle">
      Smart AI-powered insights for cleaner teeth, healthier gums, and a brighter smile.
    </p>
  </div>
</div>

<div class="app-shell" *ngIf="!showSplash">
  <header class="app-header">
    <div class="logo-title">
      <img src="smile-iq-logo.png" alt="Smile IQ logo" class="app-logo-img" />
      <div>
        <div class="brand">Smile IQ</div>
        <div class="subtitle">Dental Analysis</div>
      </div>
    </div>

    <div class="user-section">
      <span class="version-chip" *ngIf="apiVersion">
        {{ apiVersion.api }} v{{ apiVersion.version }}
      </span>
      <button class="header-link"
              type="button"
              *ngIf="result"
              (click)="toggleHistory()">
        Scan History
      </button>
      <button class="header-outline"
              type="button"
              *ngIf="result"
              (click)="downloadReport()">
        Download PDF
      </button>
      <button class="header-primary"
              type="button"
              *ngIf="result"
              (click)="startNewAnalysis()">
        New Analysis
      </button>
    </div>
  </header>

  <div class="global-alert" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <main class="layout">
    <app-capture-panel
      [externalPatientId]="externalPatientId"
      [showCaptureOptions]="showCaptureOptions"
      [imagePreviewUrl]="imagePreviewUrl"
      [isCameraActive]="isCameraActive"
      [loading]="loading"
      [hasSelectedFile]="!!selectedFile"
      (externalPatientIdChange)="externalPatientId = $event"
      (openCamera)="startCamera()"
      (fileSelected)="onFileSelected($event)"
      (resetCapture)="resetCapture()"
      (capturePhoto)="capturePhoto()"
      (stopCamera)="stopCamera()"
      (submitScan)="submitScan()"
    ></app-capture-panel>

    <app-insights-panel
      [result]="result"
      [loading]="loading"
      [riskLabel]="riskLabel"
      [riskPercent]="riskPercent"
      (openCarePlan)="openCarePlan()"
    />
  </main>

  <app-history-drawer
    [isOpen]="showHistory"
    [history]="history"
    (close)="closeHistory()"
    (selectScan)="selectHistoryScan($event)"
  ></app-history-drawer>

  <app-care-plan-modal
    [isOpen]="isCarePlanOpen"
    [result]="result"
    (close)="closeCarePlan()"
  ></app-care-plan-modal>

</div>
