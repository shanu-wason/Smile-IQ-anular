<div class="app-shell">
  <header class="app-header">
    <div class="logo-title">
      <span class="app-logo">😊</span>
      <div>
        <div class="brand">Smile IQ</div>
        <div class="subtitle">Dental Analysis</div>
      </div>
    </div>

    <div class="user-section">
      <button class="header-link" type="button" (click)="toggleHistory()">
        Scan History
      </button>
      <button
        class="header-outline"
        type="button"
        [disabled]="!result"
        (click)="downloadReport()"
      >
        Download PDF
      </button>
      <button
        class="header-primary"
        type="button"
        [disabled]="!result"
        (click)="startNewAnalysis()"
      >
        New Analysis
      </button>
    </div>
  </header>

  <main class="layout">
    <app-capture-panel
      [externalPatientId]="externalPatientId"
      [showCaptureOptions]="showCaptureOptions"
      [imagePreviewUrl]="imagePreviewUrl"
      [isCameraActive]="isCameraActive"
      [loading]="loading"
      [hasSelectedFile]="!!selectedFile"
      (externalPatientIdChange)="externalPatientId = $event"
      (openCamera)="startCamera()"
      (fileSelected)="onFileSelected($event)"
      (resetCapture)="resetCapture()"
      (capturePhoto)="capturePhoto()"
      (stopCamera)="stopCamera()"
      (submitScan)="submitScan()"
    ></app-capture-panel>

    <app-insights-panel
      [result]="result"
      [loading]="loading"
      [riskLabel]="riskLabel"
      [riskPercent]="riskPercent"
      (openCarePlan)="openCarePlan()"
    />
  </main>

  <app-history-drawer
    [isOpen]="showHistory"
    [history]="history"
    (close)="closeHistory()"
    (selectScan)="selectHistoryScan($event)"
  ></app-history-drawer>

  <app-care-plan-modal
    [isOpen]="isCarePlanOpen"
    [result]="result"
    (close)="closeCarePlan()"
  ></app-care-plan-modal>

</div>
